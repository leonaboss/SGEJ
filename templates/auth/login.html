{% load static %}
<!DOCTYPE html>
<html lang="es-ve">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGEJ | Inicio de Sesión</title>
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="{% static 'img/favicon.ico' %}?v=3">
    <link rel="icon" type="image/png" sizes="16x16" href="{% static 'img/favicon-16x16.png' %}?v=3">
    <link rel="icon" type="image/png" sizes="32x32" href="{% static 'img/favicon-32x32.png' %}?v=3">
    <link rel="apple-touch-icon" sizes="180x180" href="{% static 'img/apple-touch-icon.png' %}?v=3">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{% static 'css/sgej.css' %}?v=5">
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>
<body class="sgej-login-page">

    <div class="sgej-login-card animate-fade-in-up">
        <div class="sgej-login-header">
            <img src="{% static 'img/logo-uptag.png' %}" alt="UPTAG Logo">
            <h1>SGEJ</h1>
            <p>Sistema de Gestor de Expedientes Jurídicos</p>
        </div>
        
        <div class="sgej-login-body">
            {% if messages %}
            <div class="mb-4">
                {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show small py-2" role="alert">
                    <i class="bi bi-exclamation-triangle-fill me-1"></i> {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close" style="padding: 0.75rem;"></button>
                </div>
                {% endfor %}
            </div>
            {% endif %}

            <form method="POST" action="{% url 'usuarios:login' %}">
                {% csrf_token %}
                
                <div class="mb-3">
                    <label for="usuario" class="form-label text-muted small fw-bold text-uppercase">Usuario</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="bi bi-person text-muted"></i></span>
                        <input type="text" class="form-control border-start-0 ps-0" id="usuario" name="usuario" required autofocus autocomplete="off">
                    </div>
                </div>
                
                <div class="mb-4">
                    <div class="d-flex justify-content-between align-items-center mb-1">
                        <label for="password" class="form-label text-muted small fw-bold text-uppercase mb-0">Contraseña</label>
                        <a href="{% url 'usuarios:recovery' %}" class="small text-decoration-none" style="color: var(--color-accent-orange);">¿Olvidó su clave?</a>
                    </div>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="bi bi-shield-lock text-muted"></i></span>
                        <input type="password" class="form-control border-start-0 ps-0" id="password" name="password" required autocomplete="off">
                    </div>
                </div>

                <div class="mb-3 d-flex justify-content-center">
                    <div class="g-recaptcha" data-sitekey="{{ RECAPTCHA_SITE_KEY }}"></div>
                </div>
                
                <button type="submit" class="btn btn-sgej-primary w-100 py-2 mb-3">
                    Ingresar al Sistema <i class="bi bi-arrow-right ms-1"></i>
                </button>
                
                <div class="text-center">
                    <p class="text-muted small mb-2"><i class="bi bi-lock-fill me-1"></i> Conexión Cifrada y Auditada</p>
                    <p class="text-muted small mb-0">
                        ¿No tiene cuenta? <a href="{% url 'usuarios:register' %}" class="text-decoration-none fw-semibold" style="color: var(--color-accent-orange);">Crear Cuenta</a>
                    </p>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'js/password-toggle.js' %}?v=2"></script>
</body>
</html>
