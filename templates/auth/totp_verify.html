{% extends 'base.html' %}{% load static %}
{% block title %}Verificación 2FA — SGEJ{% endblock %}
{% block content %}
<div class="container min-vh-100 d-flex align-items-center justify-content-center">
    <div class="card shadow-sm" style="max-width: 440px; width: 100%;">
        <div class="card-body p-4 text-center">
            <div class="mb-3">
                <span class="badge bg-dark p-3 rounded-circle"><i class="bi bi-shield-lock-fill fs-3 text-white"></i></span>
            </div>
            <h5 class="fw-bold">Autenticación de Dos Factores</h5>
            <p class="text-muted small">Ingrese el código generado por su aplicación de autenticación.</p>
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <input type="text" name="token" class="form-control form-control-lg text-center"
                           placeholder="000000" maxlength="6" inputmode="numeric" autocomplete="one-time-code"
                           pattern="[0-9]{6}" required>
                </div>
                <button type="submit" class="btn btn-dark w-100">Verificar</button>
            </form>
            <div class="mt-3">
                <a href="{% url 'usuarios:login' %}" class="text-decoration-none small">Volver al inicio de sesión</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
