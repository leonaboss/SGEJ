{% extends 'base.html' %}{% load static %}
{% block title %}{{ accion }} Tribunal — SGEJ{% endblock %}
{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-dark text-white"><h5 class="mb-0">{{ accion }} Tribunal</h5></div>
                <div class="card-body">
                    <form method="post">{% csrf_token %}
                        {% for field in form %}<div class="mb-3"><label class="form-label">{{ field.label }}</label>{{ field }}{% if field.errors %}<div class="text-danger small">{{ field.errors }}</div>{% endif %}</div>{% endfor %}
                        <div class="d-flex justify-content-between">
                            <a href="{% url 'expedientes:tribunal_list' %}" class="btn btn-outline-secondary">Cancelar</a>
                            <button type="submit" class="btn btn-dark">Guardar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
